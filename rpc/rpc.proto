syntax = "proto3";

option cc_generic_services = true;

package lcy.rpc;

enum err {
	SUCCESS = 0;
	NO_SERVICE = 1;
	NO_METHOD = 2;
	INVALID_REQUEST = 3;
  	TIMEOUT = 4;
};

message Request {
	uint64 id = 1;
	string service_name = 2;
	string service_method = 3;
	bytes arguments = 4;
};

message Response {
	uint64 id = 1;
	err errcode = 2;
	bytes arguments = 3;
};
